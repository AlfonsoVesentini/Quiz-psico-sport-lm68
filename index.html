<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quiz – Farmacologia dello Sport</title>
<style>
  :root {
    --bg: #0b0f14;
    --card: #121826;
    --text: #e6edf3;
    --muted: #9aa4b2;
    --ok: #2ea043;
    --bad: #f85149;
    --accent: #58a6ff;
    --border: rgba(255,255,255,.10);
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
    background: linear-gradient(180deg, #070a0f, var(--bg));
    color: var(--text);
  }
  header {
    padding: 18px 16px;
    position: sticky;
    top: 0;
    background: rgba(11,15,20,.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 16px 28px;
  }
  h1 {
    font-size: 18px;
    margin: 0 0 6px;
    letter-spacing: .2px;
  }
  .sub {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.35;
  }
  .toolbar {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  button {
    appearance: none;
    border: 1px solid var(--border);
    background: #0f1522;
    color: var(--text);
    padding: 10px 12px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { border-color: rgba(255,255,255,.25); }
  button.primary {
    background: linear-gradient(180deg, #1f6feb, #1557b0);
    border-color: rgba(88,166,255,.55);
  }
  button.danger {
    background: #1a0f12;
    border-color: rgba(248,81,73,.35);
    color: #ffd7d5;
  }
  .hint {
    color: var(--muted);
    font-size: 12px;
  }
  .card {
    background: rgba(18,24,38,.72);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin: 14px 0;
  }
  .summary {
    display: none;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .pill {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    border: 1px solid var(--border);
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(15,21,34,.6);
    font-size: 13px;
  }
  .pill strong { font-size: 14px; }
  .pill.ok strong { color: #7ee787; }
  .pill.bad strong { color: #ff7b72; }
  .pill.accent strong { color: #79c0ff; }

  fieldset {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 12px 10px;
    margin: 14px 0;
    background: rgba(18,24,38,.55);
  }
  legend {
    padding: 0 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .qtext {
    font-size: 15px;
    margin: 6px 0 10px;
    line-height: 1.35;
  }
  .options {
    display: grid;
    gap: 8px;
  }
  label.option {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 10px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(15,21,34,.65);
    cursor: pointer;
  }
  label.option:hover {
    border-color: rgba(255,255,255,.22);
  }
  input[type="radio"] {
    margin-top: 2px;
    transform: scale(1.1);
    accent-color: var(--accent);
  }
  .opt-text {
    line-height: 1.25;
    font-size: 14px;
  }

  .result-line {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    display: none;
  }
  fieldset.correct {
    border-color: rgba(46,160,67,.55);
  }
  fieldset.wrong {
    border-color: rgba(248,81,73,.55);
  }
  .correct .result-line {
    display: block;
    color: #7ee787;
  }
  .wrong .result-line {
    display: block;
    color: #ff7b72;
  }
  .mark-correct {
    outline: 2px solid rgba(46,160,67,.55);
    border-color: rgba(46,160,67,.45) !important;
    background: rgba(46,160,67,.12) !important;
  }
  .mark-wrong {
    outline: 2px solid rgba(248,81,73,.45);
    border-color: rgba(248,81,73,.35) !important;
    background: rgba(248,81,73,.10) !important;
  }
  .footer {
    margin-top: 18px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Quiz – Farmacologia dello Sport</h1>
    <p class="sub">
      Rispondi a tutte le domande nella stessa pagina. Premi <b>Invio</b> (o “Calcola risultato”) per vedere punteggio e statistiche finali.
    </p>
    <div class="toolbar">
      <button class="primary" id="btnSubmit" type="button">Calcola risultato (Invio)</button>
      <button class="danger" id="btnReset" type="button">Reset</button>
      <span class="hint" id="progressHint"></span>
    </div>

    <div class="card summary" id="summary">
      <span class="pill ok"><span>Corrette</span> <strong id="sumCorrect">0</strong></span>
      <span class="pill bad"><span>Sbagliate</span> <strong id="sumWrong">0</strong></span>
      <span class="pill accent"><span>Punteggio</span> <strong id="sumPct">0%</strong></span>
      <span class="pill"><span>Non risposte</span> <strong id="sumBlank">0</strong></span>
      <span class="pill"><span>Tempo</span> <strong id="sumTime">0:00</strong></span>
    </div>
  </div>
</header>

<main class="wrap">
  <div id="quiz"></div>
  <div class="footer">
    Versione corretta: quiz unico attivo, sintassi verificata e pronto all’uso.
  </div>
</main>

<script>
const QUIZ = [
 {
   id: 1,
   q: "La percentuale del dispendio calorico quotidiano determinata dalla termogenesi indotta è pari a:",
   options: ["5%", "10%", "20%", "35%"],

 },
 {

   correct: 0
 },
 {
   id: 3,
   q: "Per azione topica di un farmaco si intende:",
   options: [
     "La comparsa di effetti prevalentemente nel punto di somministrazione del farmaco",

     "La comparsa di effetti solo dopo metabolismo epatico"
   ],
   correct: 0
 },
 {
   id: 4,
   q: "I comitati etici devono:",
   options: [
     "Promuovere la ricerca scientifica e tutelare i soggetti che partecipano alle sperimentazioni",

   ],
   correct: 0
 },
 {
   id: 5,
   q: "Il consenso informativo è fondamentale:",

 {

   ],

 },
 {
   id: 7,
   q: "Uno dei seguenti è un segno di disidratazione:",
   options: ["Bradicardia", "Crampi muscolari", "Iperglicemia", "Miosi"],
   correct: 1
 },
 {

   correct: 1
 },
 {
   id: 9,
   q: "Una definizione di farmaco secondo l’Organizzazione Mondiale della Sanità è:",

     "Qualunque sostanza naturale priva di effetti collaterali",

   correct: 0
 },
 {
   id: 10,
   q: "La farmacocinetica differisce dalla farmacodinamica perché:",
   options: [

   ],
   correct: 1

 {
   id: 11,
   q: "L’assorbimento di un farmaco è:",
   options: [
     "Il legame del farmaco ai recettori",

   correct: 1

 {
   id: 12,

   id: 13,
   q: "Uno dei seguenti fattori influenza la distribuzione del farmaco nell’organismo:",

 },
 {
   id: 14,
   q: "Un valido motivo per scegliere la somministrazione rettale invece di quella orale è:",
   options: [

   ],
   correct: 1
 },
 {
   id: 15,
   q: "Il tempo di latenza di un farmaco è:",
   options: [
     "Il tempo necessario perché compaiano i primi effetti",
     "Il tempo necessario per eliminare il 100% del farmaco",
     "Il tempo di permanenza del farmaco in farmacia",
     "Il tempo che intercorre tra due prescrizioni"
   ],
   correct: 0
 },
 {
   id: 16,
   q: "Per azione sistemica di un farmaco si intende:",
   options: [
     "La comparsa di effetti in qualunque punto dell’organismo, sia vicino sia lontano dal punto di somministrazione",
     "La comparsa di effetti esclusivamente nel punto di somministrazione",
     "L’effetto limitato alla cute",
     "L’assenza completa di effetti collaterali"
   ],
   correct: 0
 },
 {
   id: 17,
   q: "Uno dei pochi principi attivi che agisce senza interagire con uno specifico recettore è:",
   options: ["Mannitolo", "Morfina", "Naloxone", "Adrenalina"],
   correct: 0
 },
 {
   id: 18,
   q: "Uno dei seguenti è un mediatore chimico dell’infiammazione:",
   options: ["Istamina", "Insulina", "Melatonina", "Creatina"],
   correct: 0
 },
 {
   id: 19,
   q: "Una patologia di tipo emorragico aumenta il rischio di sanguinamento se il paziente assume:",
   options: ["Aspirina", "Paracetamolo", "Amoxicillina", "Loratadina"],
   correct: 0
 },
 {
   id: 20,
   q: "Le prostaglandine sono sintetizzate nel nostro organismo a partire da:",
   options: ["Acido arachidonico", "Colesterolo", "Acido lattico", "Glucosio"],
   correct: 0
 },
 {
   id: 21,
   q: "Una sostanza che può provocare dipendenza è:",
   options: ["Alcol (etanolo)", "Vitamina C", "Acido folico", "Sodio cloruro"],
   correct: 0
 },
 {
   id: 22,
   q: "Il fenomeno della tolleranza è:",
   options: [
     "La necessità di aumentare la dose di una sostanza per ottenere l’effetto desiderato",
     "L’eliminazione completa della dipendenza",

   ],
   correct: 0
 },
 {

   q: "Tra i FANS, quello considerato con il minor grado di tossicità gastrointestinale è:",
   options: ["Ketorolac", "Ibuprofene", "Nimesulide", "Indometacina"],
   correct: 1
 },
 {
   id: 24,
   q: "La via neuroanatomica sottostante alla tossicodipendenza è detta:",
   options: ["Via del piacere", "Via corticospinale", "Via piramidale", "Via ottica"],
   correct: 0
 },
 {
   id: 25,
   q: "Con il termine oppiacei si indicano:",
   options: ["Derivati dell’oppio", "Tutti gli antinfiammatori", "Solo i cannabinoidi", "Tutte le sostanze stimolanti"],
   correct: 0
 },
 {
   id: 26,
   q: "Le endorfine sono sintetizzate nel nostro organismo a partire da:",
   options: [
     "Proopiomelanocorticotropina",
     "Acido arachidonico",
     "Noradrenalina",
     "Albumina"
   ],
   correct: 0
 },
 {
   id: 27,
   q: "Il composto cocainico ritenuto con il maggior potenziale di dipendenza è:",
   options: ["Cocaina cloridrato", "Crack", "Caffeina", "Hashish"],
   correct: 1
 },
 {
   id: 28,
   q: "Una sostanza stimolante non inserita nella lista delle sostanze dopanti WADA è:",
   options: ["Amfetamina", "Efedrina", "Caffeina", "Clenbuterolo"],
   correct: 2
 },
 {
   id: 29,
   q: "Il tetraidrocannabinolo è presente in misura maggiore in:",
   options: ["Hashish", "Tabacco", "Morfina", "Eritropoietina"],
   correct: 0
 },
 {
   id: 30,
   q: "I farmaci adatti alla tosse secca sono:",
   options: ["Espettoranti", "Sedativi della tosse", "Mucolitici ad azione locale obbligatoria", "Diuretici"],
   correct: 1
 },
 {
   id: 31,
   q: "Una sostanza che non ha recettori in grado di mediare direttamente la sintesi proteica è:",
   options: ["Adrenalina", "Testosterone", "GH", "IGF-1"],
   correct: 0
 },
 {
   id: 32,
   q: "Uno dei seguenti steroidi non è un ormone:",
   options: ["Colesterolo", "Testosterone", "Cortisolo", "Estradiolo"],
   correct: 0
 },
 {
   id: 33,
   q: "In quale dei seguenti sport è vietato l’uso dei beta-bloccanti?",
   options: ["Tiro con l’arco", "Calcio", "Nuoto", "Ciclismo"],
   correct: 0
 },
 {
   id: 34,
   q: "La principale sede di sintesi dell’EPO è:",
   options: ["Fegato", "Pancreas", "Rene", "Milza"],
   correct: 2
 },
 {
   id: 35,
   q: "Uno steroide precursore metabolico del testosterone è:",
   options: ["Deidroepiandrosterone", "Insulina", "Istamina", "Naloxone"],
   correct: 0
 },
 {
   id: 36,
   q: "Una caratteristica della via di somministrazione endovenosa è:",
   options: [
     "Permette un accurato controllo della dose",
     "Ha sempre assorbimento più lento della via orale",
     "Evita ogni effetto collaterale",
     "È adatta solo ai farmaci liposolubili"
   ],
   correct: 0
 },
 {
   id: 37,
   q: "Una sede principale di metabolizzazione dei farmaci è:",
   options: ["Fegato", "Cute", "Midollo osseo", "Cartilagine"],
   correct: 0
 },
 {
   id: 38,
   q: "Una patologia che può modificare sostanzialmente l’emivita dei farmaci è:",
   options: ["Insufficienza renale", "Miopia", "Dermatite da contatto", "Rinite allergica stagionale"],
   correct: 0
 },
 {
   id: 39,
   q: "Tra i seguenti farmaci, quello senza proprietà antinfiammatorie è:",
   options: ["Ibuprofene", "Diclofenac", "Paracetamolo", "Ketorolac"],
   correct: 2
 },
 {
   id: 40,
   q: "Il naloxone è:",
   options: [
     "Un oppioide agonista",
     "Una sostanza utile nel trattamento acuto della depressione respiratoria da oppiacei",
     "Un FANS selettivo COX-2",
     "Un beta2-agonista inalatorio"
   ],
   correct: 1
 }
];
const elQuiz = document.getElementById('quiz');
const elSummary = document.getElementById('summary');
const elSumCorrect = document.getElementById('sumCorrect');
const elSumWrong = document.getElementById('sumWrong');
const elSumPct = document.getElementById('sumPct');
const elSumBlank = document.getElementById('sumBlank');
const elSumTime = document.getElementById('sumTime');
const elProgressHint = document.getElementById('progressHint');

const startTime = Date.now();
let submitted = false;

function pad2(n) {
  return String(n).padStart(2, '0');
}
function fmtTime(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}:${pad2(r)}`;
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function render() {
  const frag = document.createDocumentFragment();
  QUIZ.forEach((item, idx) => {
    const fs = document.createElement('fieldset');
    fs.id = `q_${item.id}`;
    const legend = document.createElement('legend');
    legend.textContent = `Domanda ${idx + 1} di ${QUIZ.length}`;
    fs.appendChild(legend);

    const q = document.createElement('div');
    q.className = 'qtext';
    q.innerHTML = escapeHtml(item.q);
    fs.appendChild(q);

    const opts = document.createElement('div');
    opts.className = 'options';

    item.options.forEach((opt, j) => {
      const label = document.createElement('label');
      label.className = 'option';
      label.setAttribute('data-idx', j);

      const input = document.createElement('input');
      input.type = 'radio';
      input.name = `q_${item.id}`;
      input.value = j;

      input.addEventListener('change', () => {
        updateProgress();
      });

      const span = document.createElement('span');
      span.className = 'opt-text';
      span.innerHTML = escapeHtml(opt);

      label.appendChild(input);
      label.appendChild(span);

      opts.appendChild(label);
    });
    fs.appendChild(opts);

    const res = document.createElement('div');
    res.className = 'result-line';
    res.id = `res_${item.id}`;
    res.textContent = '';
    fs.appendChild(res);

    frag.appendChild(fs);
  });
  elQuiz.appendChild(frag);
  updateProgress();
}

function getSelectedIndex(qid) {
  const checked = document.querySelector(`input[name="q_${qid}"]:checked`);
  if (!checked) return null;
  return Number(checked.value);
}

function updateProgress() {
  const answered = QUIZ.reduce((acc, it) => acc + (getSelectedIndex(it.id) !== null ? 1 : 0), 0);
  elProgressHint.textContent = `Risposte date: ${answered} / ${QUIZ.length}`;
}

function lockInputs() {
  document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
}

function clearMarks(fieldset) {
  fieldset.classList.remove('correct','wrong');
  fieldset.querySelectorAll('label.option').forEach(l => {
    l.classList.remove('mark-correct','mark-wrong');
  });
  const res = fieldset.querySelector('.result-line');
  if (res) {
    res.style.display = 'none';
    res.textContent = '';
  }
}

function submitQuiz() {
  if (submitted) return;
  submitted = true;

  let correct = 0;
  let wrong = 0;
  let blank = 0;

  QUIZ.forEach((item) => {
    const fs = document.getElementById(`q_${item.id}`);
    clearMarks(fs);

    const selected = getSelectedIndex(item.id);
    const correctIdx = item.correct;

    const labels = Array.from(fs.querySelectorAll('label.option'));
    const res = document.getElementById(`res_${item.id}`);

    // marca risposta corretta sempre
    const correctLabel = labels[correctIdx];
    if (correctLabel) correctLabel.classList.add('mark-correct');

    if (selected === null) {
      blank++;
      fs.classList.add('wrong');
      res.style.display = 'block';
      res.textContent = `Non risposto. Corretta: ${item.options[correctIdx]}`;
      return;
    }

    if (selected === correctIdx) {
      correct++;
      fs.classList.add('correct');
      res.style.display = 'block';
      res.textContent = 'Corretto ✅';
    } else {
      wrong++;
      fs.classList.add('wrong');
      const selectedLabel = labels[selected];
      if (selectedLabel) selectedLabel.classList.add('mark-wrong');
      res.style.display = 'block';
      res.textContent = `Sbagliato ❌  •  Corretta: ${item.options[correctIdx]}`;
    }
  });

  const total = QUIZ.length;
  const pct = Math.round((correct / total) * 100);
  elSumCorrect.textContent = correct;
  elSumWrong.textContent = wrong;
  elSumBlank.textContent = blank;
  elSumPct.textContent = pct + '%';
  elSumTime.textContent = fmtTime(Date.now() - startTime);

  elSummary.style.display = 'flex';
  lockInputs();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetQuiz() {
  submitted = false;
  elSummary.style.display = 'none';
  document.querySelectorAll('input[type="radio"]').forEach(r => {
    r.disabled = false;
    r.checked = false;
  });
  QUIZ.forEach((item) => {
    const fs = document.getElementById(`q_${item.id}`);
    if (fs) clearMarks(fs);
  });
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('btnSubmit').addEventListener('click', submitQuiz);
document.getElementById('btnReset').addEventListener('click', resetQuiz);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    submitQuiz();
  }
});

render();
</script>
</body>
</html>
